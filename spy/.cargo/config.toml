# replace STM32F103C8 with your chip as listed in `probe-run --list-chips`
[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# runner = "probe-run --chip STM32F103C8"
runner = "probe-run --chip STM32F401CCUx"
rustflags = [
	# "-C", "link-arg=-Tlink.x",
	# custom linker script that puts interrupt vector in ram
	# to lower interrupt latency
	"-C", "link-arg=-Tcustom_link.x",
	"-C", "link-arg=--nmagic",
	"-C", "link-arg=-Tdefmt.x",
]

[build]
# target = "thumbv7m-none-eabi"
target = "thumbv7em-none-eabi"

[env]
DEFMT_LOG = "trace"
