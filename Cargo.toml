[package]
name = "break-enforcer"
version = "0.1.0"
edition = "2021"

[dependencies]
embassy-sync = { version = "0.2", rev = "b2047c4", git = "https://github.com/embassy-rs/embassy", features = ["defmt"] }
embassy-executor = { version = "0.2", rev = "b2047c4", git = "https://github.com/embassy-rs/embassy", features = ["defmt", "integrated-timers", "arch-cortex-m", "executor-thread", "executor-interrupt"] }
embassy-time = { version = "0.1", rev = "b2047c4", git = "https://github.com/embassy-rs/embassy", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_768"] }
embassy-stm32 = { version = "0.1", rev = "b2047c4", git = "https://github.com/embassy-rs/embassy", features = ["nightly", "defmt", "stm32f401cc", "unstable-pac", "memory-x", "time-driver-any", "exti"]  }
embassy-usb = { version = "0.1", rev = "b2047c4", git = "https://github.com/embassy-rs/embassy", features = ["defmt"] }
embassy-futures = { version = "0.1", rev = "b2047c4", git = "https://github.com/embassy-rs/embassy" }

defmt = "0.3"
defmt-rtt = "0.4"

cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
embedded-hal = "0.2"
panic-probe = { version = "0.3", features = ["print-defmt"] }
futures = { version = "0.3", default-features = false, features = ["async-await"] }
heapless = { version = "0.7", default-features = false }
nb = "1"
static_cell = "1.0.0"

[profile.dev]
opt-level = "s"
